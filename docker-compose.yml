version: '3.9'

name: luxus-connect

services:
  postgres:
    container_name: postgres.connect.luxus
    image: luxus/postgres.connect.luxus:latest
    build:
      context: .
      dockerfile: ./docker/test/database/Dockerfile
      args:
        - TZ=America/Sao_Paulo
    env_file:
      - ./docker/test/database/.database.env
    volumes:
      - postgres-vol:/var/lib/pgsql/pgdata
      - '/etc/timezone:/etc/timezone:ro'
      - '/etc/localtime:/etc/localtime:ro'
    ports:
      - "5001:5001"
    restart: unless-stopped

  rabbitmq:
    hostname: 'mabbit'
    image: rabbitmq:management
    container_name: rabbitmq.connect.luxus
    ports:
      - 5672:5672
      - 15672:15672
    env_file:
      - ./docker/test/rabbitmq/.rabbitmq.env
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq/
      - rabbitmq-mnesia:/var/lib/rabbitmq/mnesia/

  seq:
    image: datalust/seq:latest
    container_name: seq.connect.luxus
    ports:
      - 81:80
      - 5341:5341
    env_file:
      - ./docker/test/seq/.seq.env
    volumes:
      - seq-data:/var/lib/seq/data/

  keycloak:
    container_name: keycloak.connect.luxus
    image: luxus/keycloak.connect.luxus:latest
    user: root
    build:
      context: .
      dockerfile: ./docker/test/keycloak/Dockerfile
    command: [ "start", "--optimized", "--import-realm", "--spi-theme-static-max-age=-1", "--spi-theme-cache-themes=false", "--spi-theme-cache-templates=false" ]
    env_file:
      - ./docker/test/keycloak/.keycloak.env
    depends_on:
      - postgres
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./resources/theme/:/opt/keycloak/themes/
      - ./docker/test/keycloak/data/luxus-realm.json:/opt/keycloak/data/import/luxus-realm.json:ro
    ports:
      - "8081:8080"
      - "8443:8443"

  connect-api:
    image: ${REGISTRY:-luxus/connect/api}:${PLATFORM:-linux}-${TAG:-latest}
    container_name: api.connect.luxus
    restart: always
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - '8002:80'

  connect-web:
    image: ${WEB_REGISTRY:-luxus/connect/web}:${PLATFORM:-linux}-${TAG:-latest}
    container_name: web.connect.luxus
    restart: always
    build:
      context: ./src/Luxus.Connect.Web
      dockerfile: Dockerfile

  connect-web-dev:
    profiles:
      - dev
    image: node:22-alpine
    container_name: web-dev.connect.luxus
    working_dir: /app
    env_file:
      - ./docker/test/frontend/.frontend.env
    volumes:
      - ./src/Luxus.Connect.Web:/app
      - web_dev_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - '5173:5173'

volumes:
  postgres-vol:
    name: connect.luxus.postgres-vol
  seq-data:
    name: connect.luxus.seq-vol
  keycloak-data:
    name: connect.luxus.keycloak-vol
  rabbitmq-data:
    name: connect.luxus.rabbitmq-data-vol
  rabbitmq-mnesia:
    name: connect.luxus.rabbitmq-mnesia-vol
  web_dev_node_modules:
    name: connect.luxus.web-dev-node-modules
