# TLS em /etc/nginx/ssl (fullchain.pem + privkey.pem).
# /auth → Keycloak; /api → API Go (prefixo removido: /api/v1/... → upstream /v1/...).
upstream connect_api {
    server connect-api:80;
}

upstream keycloak_internal {
    server keycloak:8080;
}

server {
    listen 80;
    server_name luxus.bitpulse.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name luxus.bitpulse.com.br;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    location /auth/ {
        proxy_pass http://keycloak_internal/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_redirect off;
    }

    location /api/ {
        proxy_pass http://connect_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
