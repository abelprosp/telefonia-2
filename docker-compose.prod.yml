# Produção / VPS: use com docker-compose.yml (ex.: ./docker-up.sh prod).
# Domínio: luxus.bitpulse.com.br — frontend em 80/443 com TLS; Keycloak em /auth; API em /api (nginx → Go API sem prefixo).
#
# Antes do primeiro up: coloque fullchain.pem e privkey.pem em docker/ssl/luxus.bitpulse.com.br/
# Schema PostgreSQL: migrações históricas em db/migrations/ef/

services:
  rabbitmq:
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 1s
      retries: 20

  postgres:
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  keycloak:
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    environment:
      - KC_HTTP_RELATIVE_PATH=/auth
      - KC_PROXY_HEADERS=xforwarded
      - KC_HOSTNAME=luxus.bitpulse.com.br
      - KC_HOSTNAME_STRICT=false
    ports: []
    restart: on-failure

  connect-api:
    environment:
      - ENVIRONMENT=Production
      - PORT=80
      - DATABASE_URL=Host=postgres;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=luxus_connect_dev;
      - RABBITMQ_URL=amqp://${RMQ_USER}:${RMQ_PWD}@rabbitmq:5672
      - KEYCLOAK_REALM=luxus
      - KEYCLOAK_AUTH_SERVER_URL=https://luxus.bitpulse.com.br/auth
      - KEYCLOAK_RESOURCE=connect-cli
      - OBJECT_STORAGE_SERVICE_URL=${OBJECT_STORAGE_SERVICE_URL}
      - OBJECT_STORAGE_ACCESS_KEY_ID=${OBJECT_STORAGE_ACCESS_KEY_ID}
      - OBJECT_STORAGE_SECRET_ACCESS_KEY=${OBJECT_STORAGE_SECRET_ACCESS_KEY}
      - CORS_ORIGINS=https://luxus.bitpulse.com.br
    ports: []
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      rabbitmq:
        condition: service_healthy
        restart: true
      keycloak:
        condition: service_started
        restart: true
    restart: on-failure

  connect-web:
    build:
      context: ./src/Luxus.Connect.Web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://luxus.bitpulse.com.br/api
        VITE_AUTH_URL: https://luxus.bitpulse.com.br/auth
        VITE_CLIENT_ID: connect-cli
        VITE_CLIENT_SECRET: ${KC_CLIENT_SECRET}
        VITE_STORAGE_BUCKET_NAME: luxus-connect
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/connect-web.vps.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl/luxus.bitpulse.com.br:/etc/nginx/ssl:ro
    restart: on-failure
