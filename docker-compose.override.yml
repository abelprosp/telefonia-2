services:

  connect-web-dev:

    profiles: []



  connect-web:

    ports:

      - '3000:80'

    build:

      context: ./src/Luxus.Connect.Web

      dockerfile: Dockerfile

      args:

        VITE_API_URL: http://localhost:8002

        VITE_AUTH_URL: http://localhost:8081

        VITE_CLIENT_ID: connect-cli

        VITE_CLIENT_SECRET: ${KC_CLIENT_SECRET:-dev-secret}

        VITE_STORAGE_BUCKET_NAME: luxus-connect



  minio:

    image: minio/minio:latest

    container_name: minio.connect.luxus

    ports:

      - '9000:9000'

      - '9001:9001'

    environment:

      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY_ID:-minioadmin}

      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-minioadmin}

    volumes:

      - minio-data:/data

    command: server /data --console-address ":9001"

    healthcheck:

      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']

      interval: 5s

      timeout: 5s

      retries: 10



  minio-init:

    image: minio/mc:latest

    container_name: minio-init.connect.luxus

    depends_on:

      minio:

        condition: service_healthy

    environment:

      MINIO_ROOT_USER: ${OBJECT_STORAGE_ACCESS_KEY_ID:-minioadmin}

      MINIO_ROOT_PASSWORD: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-minioadmin}

    entrypoint: >

      /bin/sh -c "

      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;

      mc mb local/luxus-connect --ignore-existing;

      echo '[{\"AllowedOrigin\":[\"*\"],\"AllowedMethod\":[\"GET\",\"PUT\",\"POST\",\"DELETE\",\"HEAD\"],\"AllowedHeader\":[\"*\"],\"ExposeHeader\":[\"ETag\"],\"MaxAgeSeconds\":3000}]' > /tmp/cors.json;

      mc cors set local/luxus-connect /tmp/cors.json || true;

      exit 0;

      "



  connect-api:

    extra_hosts:

      - "host.docker.internal:host-gateway"

    depends_on:

      postgres:

        condition: service_healthy

      minio:

        condition: service_healthy

    environment:

      - ENVIRONMENT=Development

      - PORT=80

      - DATABASE_URL=Host=postgres;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=luxus_connect_dev;

      - RABBITMQ_URL=amqp://${RMQ_USER}:${RMQ_PWD}@rabbitmq:5672

      - KEYCLOAK_REALM=luxus

      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080

      - KEYCLOAK_PUBLIC_AUTH_SERVER_URL=${KEYCLOAK_PUBLIC_AUTH_SERVER_URL:-http://host.docker.internal:8081}

      - KEYCLOAK_RESOURCE=connect-cli

      - KEYCLOAK_ADMIN_USERNAME=admin

      - KEYCLOAK_ADMIN_PASSWORD=${KC_ADMIN_PWD}

      - OBJECT_STORAGE_SERVICE_URL=${OBJECT_STORAGE_SERVICE_URL:-http://minio:9000}

      - OBJECT_STORAGE_PUBLIC_URL=${OBJECT_STORAGE_PUBLIC_URL:-http://localhost:9000}

      - OBJECT_STORAGE_ACCESS_KEY_ID=${OBJECT_STORAGE_ACCESS_KEY_ID:-minioadmin}

      - OBJECT_STORAGE_SECRET_ACCESS_KEY=${OBJECT_STORAGE_SECRET_ACCESS_KEY:-minioadmin}

      - CORS_ORIGINS=https://localhost:8002;http://localhost:8002;http://localhost:4200;http://localhost:3000;http://localhost:5173

      # Sicredi API Cobrança (boleto híbrido + PIX) — https://developer.sicredi.com.br
      - SICREDI_ENABLED=${SICREDI_ENABLED:-false}
      - SICREDI_SANDBOX=${SICREDI_SANDBOX:-true}
      - SICREDI_API_KEY=${SICREDI_API_KEY:-}
      - SICREDI_USERNAME=${SICREDI_USERNAME:-}
      - SICREDI_PASSWORD=${SICREDI_PASSWORD:-}
      - SICREDI_COOPERATIVA=${SICREDI_COOPERATIVA:-}
      - SICREDI_POSTO=${SICREDI_POSTO:-}
      - SICREDI_CODIGO_BENEFICIARIO=${SICREDI_CODIGO_BENEFICIARIO:-}
      - SICREDI_PUBLIC_API_URL=${SICREDI_PUBLIC_API_URL:-}
      - SICREDI_WEBHOOK_TOKEN=${SICREDI_WEBHOOK_TOKEN:-}

volumes:
  minio-data:
    name: connect.luxus.minio-data
